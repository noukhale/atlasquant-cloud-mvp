apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: atlasquant-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: DB_HOST
              value: postgres
            - name: REDIS_HOST
              value: redis
            - name: KAFKA_BROKER
              value: kafka:9092