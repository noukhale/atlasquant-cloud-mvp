<!DOCTYPE html>
<html>
<head>
  <title>AtlasQuant Live</title>
</head>
<body>
  <h1>BTCUSDT Live AI Signal</h1>
  <pre id="output"></pre>

  <script>
    const output = document.getElementById("output");

    const ws = new WebSocket("ws://localhost:8000/ws/BTCUSDT");

    ws.onmessage = (event) => {
      output.textContent = event.data;
    };

    ws.onerror = (error) => {
      output.textContent = "WebSocket error";
    };
  </script>
</body>
</html>
